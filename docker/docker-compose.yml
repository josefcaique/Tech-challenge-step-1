version: "3.7"
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    restart: always
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_ACCESS_KEY}
      - MINIO_STORAGE_USE_HTTPS=false
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      

  minio-setup:
    image: quay.io/minio/mc
    depends_on:
      - minio
    volumes:
      - ./minio/create-bucket.sh:/create-bucket.sh
    entrypoint: /bin/sh
    command: -c "chmod +x /create-bucket.sh && /create-bucket.sh"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_ACCESS_KEY}


  mlflow:
    restart: always
    build: ./mlflow
    image: mlflow_server
    container_name: mlflow_server
    ports:
      - "5001:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT}
      - MLFLOW_S3_IGNORE_TLS=true
      # Allowed hosts required > v3.5 mlflow
      # https://mlflow.org/docs/latest/self-hosting/security/network
      - MLFLOW_SERVER_ALLOWED_HOSTS=${MLFLOW_SERVER_ALLOWED_HOSTS}
      - MLFLOW_SERVER_CORS_ALLOWED_ORIGINS=${MLFLOW_SERVER_CORS_ALLOWED_ORIGINS}

    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/mlflow
      --host 0.0.0.0
      --serve-artifacts
      --artifacts-destination s3://mlflow
      --allowed-hosts ${MLFLOW_SERVER_ALLOWED_HOSTS}
      --cors-allowed-origins ${MLFLOW_SERVER_CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  jupyter:
    build:
        context: ./jupyter        # caminho onde está o Dockerfile e requirements.txt
        dockerfile: Dockerfile
    container_name: mlflow-miniconda
    environment:
        - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
        - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
        - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
        - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT}
        - MLFLOW_ARTIFACT_URI=${MLFLOW_ARTIFACT_URI}
    volumes:
        # Monta as pastas do seu projeto (que estão em ../src/)
        - ../:/home/jarvis/
    ports:
        - "8888:8888"
    depends_on:
      mlflow:
        condition: service_healthy
  #  networks:
  #      - ml-net
    restart: unless-stopped

  # ==================== FASTAPI (SERVE MODELOS) ====================
  fastapi:
    build: ./fastapi-app
    container_name: mlflow-fastapi
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT}
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
  #  networks:
  #      - ml-net
    restart: unless-stopped
    volumes:
      # Monta toda a pasta src (código da aplicação) dentro do container
      - ../src:/app/src
    working_dir: /app/src
    # Supondo que o ponto de entrada seja um arquivo main.py na raiz de src/
    # Se seu main.py estiver dentro de service/, ajuste para "service.main:app"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  minio_data:
